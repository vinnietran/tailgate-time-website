<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TailgateTime - Connect Return</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        font-family: "Georgia", "Times New Roman", serif;
        background: #f7f3ee;
        color: #1f1a16;
        display: grid;
        min-height: 100vh;
        place-items: center;
      }
      main {
        max-width: 520px;
        text-align: center;
        padding: 32px 24px;
        border: 2px solid #1f1a16;
        background: #fff9f2;
        box-shadow: 6px 6px 0 #1f1a16;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        letter-spacing: 0.5px;
      }
      p {
        margin: 0 0 20px;
        font-size: 16px;
      }
      a.button {
        display: inline-block;
        padding: 10px 18px;
        border: 2px solid #1f1a16;
        background: #ffcc57;
        color: #1f1a16;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You're all set</h1>
      <p>Opening the app...</p>
      <a class="button" id="return-link" href="/#/account">Return to dashboard</a>
    </main>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var eventId = params.get("eventId");
        var redirect = params.get("redirect");
        var normalizedRedirect =
          typeof redirect === "string" &&
          redirect.charAt(0) === "/" &&
          redirect.slice(0, 2) !== "//"
            ? redirect
            : null;
        var target = normalizedRedirect
          ? window.location.origin + "/#" + normalizedRedirect
          : eventId
            ? window.location.origin + "/#/tailgates/" + encodeURIComponent(eventId)
            : window.location.origin + "/#/account";

        var link = document.getElementById("return-link");
        if (link) {
          link.href = target;
        }

        window.location.replace(target);
      })();
    </script>
  </body>
</html>
